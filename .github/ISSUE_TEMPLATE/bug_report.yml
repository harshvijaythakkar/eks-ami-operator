name: Bug report
description: Report a bug in eks-ami-operator
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Operator version
      placeholder: v0.1.0
    validations:
      required: true

  - type: input
    id: kubernetes
    attributes:
      label: Kubernetes version
      placeholder: v1.29.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Apply this NodeGroupUpgradePolicy...
        2. Wait for reconciliation...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: policy
    attributes:
      label: NodeGroupUpgradePolicy spec
      description: Paste the relevant CR spec (redact sensitive values).
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Operator logs
      description: Paste relevant log output from `kubectl logs -n eks-ami-operator-system deployment/eks-ami-operator`.
      render: text

  - type: textarea
    id: status
    attributes:
      label: kubectl describe output
      description: Output of `kubectl describe nodegroupupgradepolicy <name> -n eks-ami-operator-system`.
      render: text