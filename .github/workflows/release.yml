name: Release

# Triggered only when a version tag is pushed (e.g. v1.0.0).
# This workflow does NOT run on pull requests or branch pushes.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Job 1: Build and push multi-arch Docker image to GHCR ──────────────────
  release-image:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: buildx

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        run: |
          make docker-buildx \
            IMG=ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            BUILDX_BUILDER=${{ steps.buildx.outputs.name }}

  # ── Job 2: Package and push Helm chart to GHCR as an OCI artifact ──────────
  # Both the image and chart live in the same registry:
  #   Image: ghcr.io/harshvijaythakkar/eks-ami-operator:<tag>
  #   Chart: oci://ghcr.io/harshvijaythakkar/charts/eks-ami-operator
  release-chart:
    name: Push Helm chart to GHCR (OCI)
    runs-on: ubuntu-latest
    needs: release-image
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Update chart versions to match release tag
        run: |
          VERSION=${{ github.ref_name }}
          CHART_VERSION=${VERSION#v}
          sed -i "s/^version:.*/version: ${CHART_VERSION}/" charts/eks-ami-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/eks-ami-operator/Chart.yaml

      - name: Package Helm chart
        run: make helm-package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR as OCI artifact
        run: |
          VERSION=${{ github.ref_name }}
          CHART_VERSION=${VERSION#v}
          helm push dist/eks-ami-operator-${CHART_VERSION}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

  # ── Job 3: Create the main GitHub release with notes and install docs ───────
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [release-image, release-chart]
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
          # The body below is the release description shown on the GitHub release
          # page — it is documentation for users, not commands being executed here.
          body: |
            ## Artifacts

            Both the container image and Helm chart are published to GHCR.

            | Artifact | Location |
            |---|---|
            | Container image | `ghcr.io/${{ github.repository }}:${{ github.ref_name }}` |
            | Helm chart (OCI) | `oci://ghcr.io/${{ github.repository_owner }}/charts/eks-ami-operator:${{ github.ref_name }}` |

            ## Install with Helm

            ```bash
            helm install eks-ami-operator \
              oci://ghcr.io/${{ github.repository_owner }}/charts/eks-ami-operator \
              --version ${{ github.ref_name }} \
              --namespace eks-ami-operator-system \
              --create-namespace
            ```

            See the [chart README](https://github.com/${{ github.repository }}/blob/main/charts/eks-ami-operator/README.md) for full configuration options.